<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libar Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a73e8; --primary-dark: #1557b0; --bg: #f5f7fa;
      --surface: #ffffff; --text: #1f2937; --text-muted: #6b7280;
      --border: #e5e7eb; --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    #chat-container {
      width: 420px; max-width: 100vw; height: 640px; max-height: 95vh;
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border);
    }
    #chat-header {
      background: var(--primary); color: #fff; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    #chat-header .avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    #chat-header .info h2 { font-size: 15px; font-weight: 600; }
    #chat-header .info p { font-size: 12px; opacity: .85; }

    #pre-chat { padding: 24px 20px; flex: 1; overflow-y: auto; }
    #pre-chat h3 { font-size: 16px; margin-bottom: 16px; }
    #pre-chat .field { margin-bottom: 14px; }
    #pre-chat label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
    #pre-chat input, #pre-chat textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s;
    }
    #pre-chat input:focus, #pre-chat textarea:focus { border-color: var(--primary); }
    #pre-chat textarea { resize: vertical; min-height: 80px; }
    #pre-chat button {
      width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s;
    }
    #pre-chat button:hover { background: var(--primary-dark); }
    #pre-chat button:disabled { opacity: .6; cursor: not-allowed; }

    #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: none; flex-direction: column; gap: 10px; }
    .msg { max-width: 82%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: #f0f2f5; color: var(--text); border-bottom-left-radius: 4px; }
    .msg .ts { display: block; font-size: 11px; opacity: .6; margin-top: 4px; }

    .links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .links a { font-size: 12px; background: #e8f0fe; color: var(--primary); padding: 4px 10px; border-radius: 12px; text-decoration: none; }
    .links a:hover { background: #d2e3fc; }

    #input-bar {
      display: none; padding: 12px 16px; border-top: 1px solid var(--border);
      flex-shrink: 0; gap: 8px; align-items: flex-end;
    }
    #input-bar textarea {
      flex: 1; resize: none; border: 1px solid var(--border); border-radius: 20px;
      padding: 10px 14px; font-size: 14px; font-family: inherit; max-height: 100px;
      outline: none; transition: border-color .2s;
    }
    #input-bar textarea:focus { border-color: var(--primary); }
    #input-bar button {
      width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary);
      color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; transition: background .2s;
    }
    #input-bar button:hover { background: var(--primary-dark); }
    #input-bar button:disabled { opacity: .5; cursor: not-allowed; }

    .typing { display: none; padding: 0 20px 8px; font-size: 13px; color: var(--text-muted); }

    @media (max-width: 480px) {
      #chat-container { width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; border: none; }
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <div class="avatar">📚</div>
      <div class="info">
        <h2>Libar Asistent</h2>
        <p>Online — obično odgovaramo odmah</p>
      </div>
    </div>

    <div id="pre-chat">
      <h3>Započnite razgovor</h3>
      <div class="field"><label>Ime</label><input id="pc-name" placeholder="Vaše ime"></div>
      <div class="field"><label>Email *</label><input id="pc-email" type="email" placeholder="vas@email.com" required></div>
      <div class="field"><label>Poruka *</label><textarea id="pc-message" placeholder="Kako vam možemo pomoći?"></textarea></div>
      <button id="pc-submit">Pošalji</button>
    </div>

    <div id="messages"></div>
    <div class="typing" id="typing">Libar Asistent piše…</div>
    <div id="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Napišite poruku…"></textarea>
      <button id="msg-send">➤</button>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let sessionId = null;
    let ticketId = null;

    const $ = (sel) => document.querySelector(sel);
    const preChat = $("#pre-chat");
    const messagesEl = $("#messages");
    const inputBar = $("#input-bar");
    const typingEl = $("#typing");

    function addMessage(role, content, links) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = content;
      if (links && links.length) {
        const ld = document.createElement("div");
        ld.className = "links";
        links.forEach((l) => { const a = document.createElement("a"); a.href = l.url; a.target = "_blank"; a.textContent = l.label; ld.appendChild(a); });
        div.appendChild(ld);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showChat() {
      preChat.style.display = "none";
      messagesEl.style.display = "flex";
      inputBar.style.display = "flex";
      $("#msg-input").focus();
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? "…" : (btn.id === "pc-submit" ? "Pošalji" : "➤");
    }

    $("#pc-submit").addEventListener("click", async () => {
      const name = $("#pc-name").value.trim();
      const email = $("#pc-email").value.trim();
      const message = $("#pc-message").value.trim();
      if (!email || !message) return alert("Email i poruka su obavezni.");

      const btn = $("#pc-submit");
      setLoading(btn, true);

      try {
        const res = await fetch(`${API}/api/chat/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, message })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "Start failed");
        sessionId = data.sessionId;
        ticketId = data.ticketId;
        showChat();
        (data.messages || []).forEach((m) => addMessage(m.role, m.content));
        if (data.links?.length) {
          const last = messagesEl.lastElementChild;
          if (last) { const ld = document.createElement("div"); ld.className = "links"; data.links.forEach((l) => { const a = document.createElement("a"); a.href = l.url; a.target = "_blank"; a.textContent = l.label; ld.appendChild(a); }); last.appendChild(ld); }
        }
      } catch (e) {
        alert(e.message);
      } finally {
        setLoading(btn, false);
      }
    });

    async function sendMessage() {
      const input = $("#msg-input");
      const message = input.value.trim();
      if (!message || !sessionId) return;

      input.value = "";
      addMessage("user", message);
      typingEl.style.display = "block";
      $("#msg-send").disabled = true;

      try {
        const res = await fetch(`${API}/api/chat/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, message })
        });
        const data = await res.json();
        typingEl.style.display = "none";
        if (!data.success) { addMessage("assistant", data.error || "Greška."); return; }

        const botMsgs = (data.messages || []).filter((m) => m.role === "assistant");
        const last = botMsgs[botMsgs.length - 1];
        if (last) addMessage("assistant", last.content, data.links);
      } catch (e) {
        typingEl.style.display = "none";
        addMessage("assistant", "Nešto je pošlo po krivu. Pokušajte ponovno.");
      } finally {
        $("#msg-send").disabled = false;
        input.focus();
      }
    }

    $("#msg-send").addEventListener("click", sendMessage);
    $("#msg-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
